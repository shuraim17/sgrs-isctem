<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SGRS ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --apple-blue: #0071e3;
            --sf-font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-apple: 28px;
            --sidebar-width: 280px;
            --transition-apple: cubic-bezier(0.2, 0, 0, 1);
            --transition-fast: 0.25s var(--transition-apple);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin:0; font-family: var(--sf-font); background:#fbfbfd; display:flex; min-height:100vh; color: #1d1d1f; }
        /* Liquid Glass Background */
        .liquid-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: linear-gradient(135deg, #f5f7fa 0%, #e4e7eb 100%);
        }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5;
            animation: floatLiquid 30s infinite alternate var(--transition-apple);
        }
        .bg-orb--1 { width: 600px; height: 600px; background: radial-gradient(circle, #818cf8 0%, #c084fc 100%); top: -200px; left: -150px; }
        .bg-orb--2 { width: 500px; height: 500px; background: radial-gradient(circle, #38bdf8 0%, #818cf8 100%); bottom: -150px; right: -100px; animation-delay: -5s; }
        .bg-orb--3 { width: 400px; height: 400px; background: radial-gradient(circle, #f472b6 0%, #fb7185 100%); top: 40%; left: 60%; animation-delay: -10s; opacity: 0.3; }
        @keyframes floatLiquid {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(50px, -40px) rotate(120deg) scale(1.1); }
            66% { transform: translate(-30px, 60px) rotate(240deg) scale(0.9); }
            100% { transform: translate(20px, -20px) rotate(360deg) scale(1.05); }
        }
        .sidebar {
            width:var(--sidebar-width); background:rgba(255,255,255,0.4); backdrop-filter:blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            position:fixed; top:0; left:0; height:100vh; padding:32px 24px;
            border-right: 1px solid var(--glass-border); z-index: 100;
        }
        .nav-link {
            color: #424245; padding: 14px 20px; border-radius: 18px; margin-bottom: 12px;
            transition: all 0.3s var(--transition-apple); font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 16px;
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.6); color: var(--apple-blue); transform: translateX(4px); }
        .main-content { 
            margin-left:var(--sidebar-width); flex:1; padding:48px; position: relative; z-index: 1; 
            animation: fadeIn 0.4s var(--transition-apple);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-dashboard {
            background:rgba(255,255,255,0.45); backdrop-filter:blur(20px); border-radius:var(--radius-apple);
            padding:32px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            transition: all var(--transition-fast);
        }
        .card-dashboard:hover { transform: translateY(-5px); box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
        .btn-glass {
            background:#1d1d1f; color:white; border:none; padding:12px 24px; border-radius:18px;
            cursor:pointer; font-weight: 600; transition: all 0.3s var(--transition-apple);
        }
        .btn-glass:hover { background: #000; transform: scale(1.02); }
        .input-glass {
            display: flex; align-items: center; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.06);
            border-radius: 20px; padding: 14px 20px; gap: 18px; transition: all var(--transition-fast);
        }
        .input-glass:focus-within { background: #fff; border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0,113,227,0.12); transform: translateY(-1px); }
        .input-glass i { color: #424245; font-size: 1.1rem; width: 24px; text-align: center; }
        .input-glass input { flex: 1; border: none; background: transparent; outline: none; }
        .btn-glass:hover { background: #1d1d1f; transform: scale(1.02); }
        .modal-content {
            background:rgba(255,255,255,0.6); backdrop-filter:blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border-radius: 32px; border: 1px solid var(--glass-border); padding: 24px;
        }
        .toast-apple {
            background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); border-radius:20px;
            padding:16px 24px; position:fixed; top:32px; right:32px; z-index:9999;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid var(--glass-border);
        }
        .mobile-toggle {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: rgba(255,255,255,0.8); border: 1px solid var(--glass-border);
            padding: 10px; border-radius: 12px; backdrop-filter: blur(10px);
        }
        @media (max-width:768px) {
            .sidebar { 
                transform: translateX(-100%); transition: transform 0.4s var(--transition-apple);
                width: 280px; z-index: 1000;
            }
            .sidebar.active { transform: translateX(0); box-shadow: 0 0 50px rgba(0,0,0,0.1); }
            .main-content { margin-left:0; padding: 80px 24px 24px; }
            .mobile-toggle { display: block; }
        }
    </style>
</head>
<body>
<div class="liquid-container">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
</div>
<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

<button class="mobile-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>

<div class="sidebar" id="sidebar">
    <div class="text-center mb-4">
        <i class="fa-solid fa-shield-halved fa-2x" style="color:var(--apple-blue);"></i>
        <h5 class="mt-2">SGRS Admin</h5>
    </div>
    <ul class="list-unstyled mt-4">
        <li><a href="#" class="active nav-link"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a></li>
        <li><a href="#" data-bs-toggle="modal" data-bs-target="#modalUtilizadores" class="nav-link"><i class="fa-solid fa-users me-2"></i> Utilizadores</a></li>
        <li><a href="#" data-bs-toggle="modal" data-bs-target="#modalHorario" class="nav-link"><i class="fa-solid fa-clock me-2"></i> Horário Faculdade</a></li>
        <li class="mt-auto"><a href="index.html" class="nav-link text-danger"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Sair</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="topbar mb-4">
        <h4 class="mb-0">Painel de Administração</h4>
        <div class="d-flex align-items-center">
            <span class="badge bg-primary rounded-pill px-3 py-2">Modo Admin</span>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card-dashboard">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="text-muted mb-0">Total Utilizadores</h6>
                    <i class="fa-solid fa-user-group text-primary"></i>
                </div>
                <h2 id="totalUsers" class="mb-0"><i class="fa-solid fa-circle-notch fa-spin fs-4 text-muted"></i></h2>
            </div>
        </div>
    </div>
</div>

<!-- Modal Utilizadores -->
<div class="modal fade" id="modalUtilizadores" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content p-4">
            <div class="modal-header">
                <h5>Gerir Utilizadores</h5>
                <button class="btn-glass" data-bs-toggle="modal" data-bs-target="#modalNovoUtilizador">+ Novo</button>
            </div>
            <div class="modal-body">
                <table class="table">
                    <thead><tr><th>Email</th><th>Nome</th><th>Função</th><th>Ações</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Horário -->
<div class="modal fade" id="modalHorario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-4">
            <h5>Configurar Horário de Funcionamento</h5>
            <p class="text-muted small">Define o intervalo de tempo permitido para requisições.</p>
            <form id="formHorario">
                <div class="mb-3">
                    <label class="form-label small">Hora de Abertura</label>
                    <div class="input-glass"><i class="fas fa-sun"></i><input type="time" id="horaAbertura" required></div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Hora de Fecho</label>
                    <div class="input-glass"><i class="fas fa-moon"></i><input type="time" id="horaFecho" required></div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Dias de Funcionamento</label>
                    <div class="d-flex gap-2 flex-wrap">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="1" id="diaSeg" checked disabled>
                            <label class="form-check-label small" for="diaSeg">Seg-Sáb (Padrão)</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-glass w-100">Guardar Configurações</button>
            </form>
        </div>
    </div>
</div>

<!-- Modal Novo Utilizador -->
<div class="modal fade" id="modalNovoUtilizador" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-4">
            <h5>Novo Utilizador</h5>
            <form id="formNovoUtilizador">
                <div class="input-glass mb-3"><i class="fas fa-envelope"></i><input type="email" id="novoEmail" placeholder="Email" required></div>
                <div class="input-glass mb-3"><i class="fas fa-user"></i><input type="text" id="novoNome" placeholder="Nome" required></div>
                <div class="input-glass mb-3"><i class="fas fa-lock"></i><input type="password" id="novaSenha" placeholder="Senha" required></div>
                <select id="novaFuncao" class="form-select mb-3">
                    <option value="">Função</option>
                    <option value="Docente">Docente</option>
                    <option value="Gestor">Gestor</option>
                    <option value="Admin">Admin</option>
                </select>
                <button type="submit" class="btn-glass">Criar</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const loggedFuncao = (sessionStorage.getItem('loggedFuncao') || '').toLowerCase();
    if (!sessionStorage.getItem('loggedEmail') || !loggedFuncao.includes('admin')) {
        window.location.href = 'index.html';
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAH9cA7UTOUzzHFKswBAkAOjdZIyynaMQg",
        authDomain: "sgrs-isctem.firebaseapp.com",
        projectId: "sgrs-isctem",
        storageBucket: "sgrs-isctem.firebasestorage.app",
        messagingSenderId: "1029014740161",
        appId: "1:1029014740161:web:e80c034c58df4424928840"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showToast(msg, type='success') {
        const t = document.createElement('div'); t.className='toast-apple'; t.textContent=msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(()=>t.remove(),4000);
    }

    async function carregarUsuarios() {
        const tbody = document.getElementById('usersTableBody');
        const totalUsersEl = document.getElementById('totalUsers');
        
        try {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">A carregar utilizadores...</td></tr>';
            const snapshot = await db.collection('users').get();
            tbody.innerHTML = '';
            let count = 0;
            
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum utilizador encontrado.</td></tr>';
                totalUsersEl.textContent = '0';
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                count++;
                tbody.innerHTML += `<tr>
                    <td>${data.email || 'N/A'}</td>
                    <td>${data.nome || 'N/A'}</td>
                    <td>${data.funcao || 'Docente'}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="apagarUsuario('${doc.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            totalUsersEl.textContent = count;
        } catch (error) {
            console.error("Erro ao carregar:", error);
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Erro ao carregar dados: ${error.message}</td></tr>`;
            showToast('Erro ao carregar lista.', 'error');
        }
    }

    window.apagarUsuario = async function(uid) {
        if (!confirm('Tem certeza? Essa ação não pode ser desfeita.')) return;
        try {
            await db.collection('users').doc(uid).delete();
            try {
                const response = await fetch('/api/deleteUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });
                if (!response.ok) throw new Error('Falha na cloud function');
            } catch (e) {
                console.warn('Cloud function não disponível. Utilizador removido apenas da base de dados.');
            }
            showToast('Utilizador removido.');
            carregarUsuarios();
        } catch (error) {
            showToast('Erro: ' + error.message, 'error');
        }
    };

    document.getElementById('formNovoUtilizador').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('novoEmail').value.trim();
        const nome = document.getElementById('novoNome').value.trim();
        const senha = document.getElementById('novaSenha').value;
        const funcao = document.getElementById('novaFuncao').value;
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
            const uid = userCredential.user.uid;
            await db.collection('users').doc(uid).set({ nome, funcao, email });
            showToast('Utilizador criado!');
            bootstrap.Modal.getInstance(document.getElementById('modalNovoUtilizador')).hide();
            document.getElementById('formNovoUtilizador').reset();
            carregarUsuarios();
        } catch (error) {
            showToast('Erro: ' + error.message, 'error');
        }
    });

    async function carregarConfiguracoes() {
        try {
            const doc = await db.collection('settings').doc('schedule').get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('horaAbertura').value = data.abertura || "06:30";
                document.getElementById('horaFecho').value = data.fecho || "17:45";
            } else {
                document.getElementById('horaAbertura').value = "06:30";
                document.getElementById('horaFecho').value = "17:45";
            }
        } catch (e) {
            console.error("Erro ao carregar configurações", e);
        }
    }

    document.getElementById('formHorario').addEventListener('submit', async (e) => {
        e.preventDefault();
        const abertura = document.getElementById('horaAbertura').value;
        const fecho = document.getElementById('horaFecho').value;
        try {
            await db.collection('settings').doc('schedule').set({
                abertura, fecho, dias: "Seg-Sáb"
            });
            showToast('Horário atualizado com sucesso!');
            bootstrap.Modal.getInstance(document.getElementById('modalHorario')).hide();
        } catch (error) {
            showToast('Erro ao salvar: ' + error.message, 'error');
        }
    });

    carregarUsuarios();
    carregarConfiguracoes();

    document.getElementById('sidebarToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('active');
        const icon = document.querySelector('#sidebarToggle i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-xmark');
    });
</script>
</body>
</html>

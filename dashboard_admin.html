<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SGRS ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass-bg: rgba(255,255,255,0.25); --sidebar-width: 260px; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f0f0f5; display:flex; min-height:100vh; }
        .bg-orb { position:fixed; border-radius:50%; filter:blur(120px); opacity:0.4; }
        .bg-orb--1 { width:500px; height:500px; background:radial-gradient(circle, #d4b8f0, #b388ff); top:-120px; left:-100px; }
        .bg-orb--2 { width:420px; height:420px; background:radial-gradient(circle, #b3e5fc, #81d4fa); bottom:-110px; right:-80px; }
        .sidebar { width:var(--sidebar-width); background:rgba(255,255,255,0.35); backdrop-filter:blur(25px); position:fixed; top:0; left:0; height:100vh; padding:24px; }
        .main-content { margin-left:var(--sidebar-width); flex:1; padding:30px; }
        .card-dashboard { background:rgba(255,255,255,0.35); border-radius:24px; padding:24px; }
        .btn-glass { background:rgba(29,29,31,0.9); color:white; border:none; padding:10px 22px; border-radius:14px; cursor:pointer; }
        .modal-content { background:rgba(255,255,255,0.45); backdrop-filter:blur(30px); }
        .toast-apple { background:rgba(255,255,255,0.75); border-radius:18px; padding:14px 20px; position:fixed; top:20px; right:20px; z-index:9999; }
        @media (max-width:768px) {
            .sidebar { width:100%; height:auto; position:relative; }
            .main-content { margin-left:0; }
        }
    </style>
</head>
<body>
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

<div class="sidebar">
    <div class="text-center"><i class="fas fa-university fa-2x" style="color:#6a1b9a;"></i><h5>SGRS Admin</h5></div>
    <ul class="list-unstyled mt-4">
        <li><a href="#" class="active nav-link">Dashboard</a></li>
        <li><a href="#" data-bs-toggle="modal" data-bs-target="#modalUtilizadores" class="nav-link">Utilizadores</a></li>
        <li><a href="index.html" class="nav-link text-danger">Sair</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="topbar bg-glass mb-4 p-3 rounded-4"><h4>Painel Admin</h4></div>
    <div class="row g-4">
        <div class="col-md-3"><div class="card-dashboard"><h6>Utilizadores</h6><h2 id="totalUsers"></h2></div></div>
    </div>
</div>

<!-- Modal Utilizadores -->
<div class="modal fade" id="modalUtilizadores" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content p-4">
            <div class="modal-header">
                <h5>Gerir Utilizadores</h5>
                <button class="btn-glass" data-bs-toggle="modal" data-bs-target="#modalNovoUtilizador">+ Novo</button>
            </div>
            <div class="modal-body">
                <table class="table">
                    <thead><tr><th>Email</th><th>Nome</th><th>Função</th><th>Ações</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Novo Utilizador -->
<div class="modal fade" id="modalNovoUtilizador" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-4">
            <h5>Novo Utilizador</h5>
            <form id="formNovoUtilizador">
                <div class="input-glass mb-3"><i class="fas fa-envelope"></i><input type="email" id="novoEmail" placeholder="Email" required></div>
                <div class="input-glass mb-3"><i class="fas fa-user"></i><input type="text" id="novoNome" placeholder="Nome" required></div>
                <div class="input-glass mb-3"><i class="fas fa-lock"></i><input type="password" id="novaSenha" placeholder="Senha" required></div>
                <select id="novaFuncao" class="form-select mb-3">
                    <option value="">Função</option>
                    <option value="Docente">Docente</option>
                    <option value="Gestor">Gestor</option>
                    <option value="Admin">Admin</option>
                </select>
                <button type="submit" class="btn-glass">Criar</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const loggedFuncao = (sessionStorage.getItem('loggedFuncao') || '').toLowerCase();
    if (!sessionStorage.getItem('loggedEmail') || !loggedFuncao.includes('admin')) {
        window.location.href = 'index.html';
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAH9cA7UTOUzzHFKswBAkAOjdZIyynaMQg",
        authDomain: "sgrs-isctem.firebaseapp.com",
        projectId: "sgrs-isctem",
        storageBucket: "sgrs-isctem.firebasestorage.app",
        messagingSenderId: "1029014740161",
        appId: "1:1029014740161:web:e80c034c58df4424928840"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showToast(msg, type='success') {
        const t = document.createElement('div'); t.className='toast-apple'; t.textContent=msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(()=>t.remove(),4000);
    }

    async function carregarUsuarios() {
        const tbody = document.getElementById('usersTableBody');
        const totalUsersEl = document.getElementById('totalUsers');

        try {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">A carregar utilizadores...</td></tr>';
            const snapshot = await db.collection('users').get();
            tbody.innerHTML = '';
            let count = 0;

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum utilizador encontrado.</td></tr>';
                totalUsersEl.textContent = '0';
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                count++;
                tbody.innerHTML += `<tr>
                    <td>${data.email || 'N/A'}</td>
                    <td>${data.nome || 'N/A'}</td>
                    <td>${data.funcao || 'Docente'}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="apagarUsuario('${doc.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            totalUsersEl.textContent = count;
        } catch (error) {
            console.error("Erro ao carregar:", error);
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Erro ao carregar dados: ${error.message}</td></tr>`;
            showToast('Erro ao carregar lista.', 'error');
        }
    }

    window.apagarUsuario = async function(uid) {
        if (!confirm('Tem certeza? Essa ação não pode ser desfeita.')) return;
        try {
            await db.collection('users').doc(uid).delete();
            try {
                const response = await fetch('/api/deleteUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });
                if (!response.ok) throw new Error('Falha na cloud function');
            } catch (e) {
                console.warn('Cloud function não disponível. Utilizador removido apenas da base de dados.');
            }
            showToast('Utilizador removido.');
            carregarUsuarios();
        } catch (error) {
            showToast('Erro: ' + error.message, 'error');
        }
    };

    document.getElementById('formNovoUtilizador').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('novoEmail').value.trim();
        const nome = document.getElementById('novoNome').value.trim();
        const senha = document.getElementById('novaSenha').value;
        const funcao = document.getElementById('novaFuncao').value;
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
            const uid = userCredential.user.uid;
            await db.collection('users').doc(uid).set({ nome, funcao, email });
            showToast('Utilizador criado!');
            bootstrap.Modal.getInstance(document.getElementById('modalNovoUtilizador')).hide();
            document.getElementById('formNovoUtilizador').reset();
            carregarUsuarios();
        } catch (error) {
            showToast('Erro: ' + error.message, 'error');
        }
    });

    carregarUsuarios();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRS — Painel Admin | ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --apple-blue: #0071e3;
            --sf-font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-apple: 20px;
            --transition-apple: cubic-bezier(0.2, 0, 0, 1);
        }
        body { margin: 0; min-height: 100vh; font-family: var(--sf-font); background: #f5f5f7; color: #1d1d1f; display: flex; }
        #sidebar { width: 280px; height: 100vh; background: rgba(255,255,255,0.7); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); padding: 30px 20px; position: fixed; z-index: 100; transition: transform 0.4s var(--transition-apple); }
        .main-content { flex: 1; padding: 40px; margin-left: 280px; width: calc(100% - 280px); }
        .card-apple { background: #fff; border-radius: var(--radius-apple); padding: 25px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.02); margin-bottom: 24px; }
        .stat-card { text-align: center; }
        .stat-card h3 { font-size: 36px; font-weight: 700; color: var(--apple-blue); }
        .btn-apple { background: var(--apple-blue); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .toast-apple { position: fixed; bottom: 30px; right: 30px; z-index: 9999; background: rgba(29, 29, 31, 0.9); color: #fff; padding: 16px 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        @media (max-width: 992px) { #sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; width: 100%; padding-top: 80px; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="mb-5"><img src="logo1.png" width="40"></div>
        <nav class="flex-grow-1">
            <a href="#" class="nav-link active py-3 text-dark text-decoration-none d-block"><i class="fas fa-grip me-2"></i> Dashboard</a>
            <a href="#" class="nav-link py-3 text-dark text-decoration-none d-block" data-bs-toggle="modal" data-bs-target="#modalUsuarios"><i class="fas fa-users me-2"></i> Utilizadores</a>
            <a href="#" class="nav-link py-3 text-dark text-decoration-none d-block" data-bs-toggle="modal" data-bs-target="#modalHorario"><i class="fas fa-clock me-2"></i> Horário</a>
            <a href="index.html" class="nav-link py-3 text-danger text-decoration-none d-block mt-5"><i class="fas fa-sign-out-alt me-2"></i> Sair</a>
        </nav>
    </div>

    <div class="main-content">
        <h1 class="fw-bold mb-4">Painel Administrativo</h1>
        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="card-apple stat-card"><p class="text-muted mb-1">Utilizadores</p><h3 id="totalUsers">0</h3></div></div>
            <div class="col-md-4"><div class="card-apple stat-card"><p class="text-muted mb-1">Requisições</p><h3 id="totalReqs">0</h3></div></div>
            <div class="col-md-4"><div class="card-apple stat-card"><p class="text-muted mb-1">Status</p><h3 class="text-success">Ativo</h3></div></div>
        </div>

        <div class="card-apple">
            <h5 class="fw-bold mb-4">Requisições Recentes</h5>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead><tr><th>ID</th><th>Docente</th><th>Data/Hora</th><th>Estado</th></tr></thead>
                    <tbody id="listaRecentes"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Usuarios -->
    <div class="modal fade" id="modalUsuarios" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Gestão de Utilizadores</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead><tr><th>Email</th><th>Nome</th><th>Função</th><th>Ações</th></tr></thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://exooykvgjxckvcnxhiap.supabase.co";
        const SUPABASE_KEY = "sb_publishable_i5paySUP8L7xAGsBENbBBg_UC3Eu_Fm";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!sessionStorage.getItem('loggedFuncao')?.toLowerCase().includes('admin')) {
            window.location.href = 'index.html';
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className='toast-apple'; t.textContent=msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>t.remove(), 4000);
        }

        async function carregarDados() {
            const { data: users } = await supabaseClient.from('profiles').select('*');
            const { data: reqs } = await supabaseClient.from('requisitions').select('*').order('created_at', {ascending: false}).limit(10);

            document.getElementById('totalUsers').textContent = users?.length || 0;
            document.getElementById('totalReqs').textContent = reqs?.length || 0;

            const uBody = document.getElementById('usersTableBody');
            uBody.innerHTML = '';
            users?.forEach(u => {
                uBody.innerHTML += `<tr><td>${u.email}</td><td>${u.nome}</td><td>${u.funcao}</td><td><button class="btn btn-sm btn-danger" onclick="deleteProfile('${u.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
            });

            const rBody = document.getElementById('listaRecentes');
            rBody.innerHTML = '';
            reqs?.forEach(r => {
                rBody.innerHTML += `<tr><td>${r.id}</td><td>${r.docente_nome}</td><td>${r.data} ${r.inicio}</td><td><span class="badge bg-light text-dark border">${r.estado}</span></td></tr>`;
            });
        }

        window.deleteProfile = async (id) => {
            if (!confirm('Eliminar perfil?')) return;
            const { error } = await supabaseClient.from('profiles').delete().eq('id', id);
            if (error) showToast('Erro: ' + error.message);
            else { showToast('Perfil removido'); carregarDados(); }
        }

        supabaseClient.channel('admin-realtime')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'requisitions' }, () => carregarDados())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => carregarDados())
            .subscribe();

        carregarDados();
    </script>
</body>
</html>

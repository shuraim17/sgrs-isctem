<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRS — Painel Gestor | ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --apple-blue: #0071e3;
            --sf-font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-apple: 20px;
            --transition-apple: cubic-bezier(0.2, 0, 0, 1);
        }
        body { margin: 0; min-height: 100vh; font-family: var(--sf-font); background: #f5f5f7; color: #1d1d1f; display: flex; }
        #sidebar { width: 280px; height: 100vh; background: rgba(255,255,255,0.7); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); padding: 30px 20px; position: fixed; z-index: 100; transition: transform 0.4s var(--transition-apple); }
        .main-content { flex: 1; padding: 40px; margin-left: 280px; width: calc(100% - 280px); }
        .card-apple { background: #fff; border-radius: var(--radius-apple); padding: 25px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.02); margin-bottom: 24px; }
        .stat-card { text-align: center; }
        .stat-card h2 { font-size: 32px; font-weight: 700; color: var(--apple-blue); }
        .toast-apple { position: fixed; bottom: 30px; right: 30px; z-index: 9999; background: rgba(29, 29, 31, 0.9); color: #fff; padding: 16px 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .search-glass { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 10px 20px; display: flex; align-items: center; margin-bottom: 25px; }
        .search-glass input { border: none; outline: none; width: 100%; margin-left: 10px; }
        #sidebar.active { transform: translateX(0) !important; }
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); z-index: 90; display: none; }
        .mobile-overlay.active { display: block; }
        .nav-link { border-radius: 12px; margin-bottom: 5px; transition: 0.2s; cursor: pointer; }
        .nav-link:hover { background: rgba(0,0,0,0.05); }
        .nav-link.active { background: var(--apple-blue); color: #fff !important; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        @media (max-width: 992px) { #sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; width: 100%; padding-top: 80px; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <img src="logo1.png" width="40">
            <button class="btn d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="flex-grow-1">
            <a onclick="showSection('dashboard')" class="nav-link active py-3 text-dark text-decoration-none d-block nav-dash"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            <a onclick="showSection('relatorio')" class="nav-link py-3 text-dark text-decoration-none d-block nav-rel"><i class="fas fa-file-alt me-2"></i> Relatório de Ocupação</a>
            <a href="index.html" class="nav-link py-3 text-danger text-decoration-none d-block mt-5"><i class="fas fa-sign-out-alt me-2"></i> Sair</a>
        </nav>
    </div>

    <button id="sidebarToggle" class="btn btn-dark d-lg-none position-fixed top-0 start-0 m-3 z-3" style="border-radius: 12px;" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="main-content">

        <!-- Dashboard Section -->
        <section id="dashboard" class="content-section active">
            <h1 class="fw-bold mb-4">Gestão Académica</h1>
            <div class="row g-4 mb-4">
                <div class="col-md-3"><div class="card-apple stat-card"><p class="text-muted mb-1">Pendentes</p><h2 id="statPendentes">0</h2></div></div>
                <div class="col-md-3"><div class="card-apple stat-card"><p class="text-muted mb-1">Aprovadas</p><h2 id="statAprovadas">0</h2></div></div>
                <div class="col-md-3"><div class="card-apple stat-card"><p class="text-muted mb-1">Total</p><h2 id="statTotal">0</h2></div></div>
                <div class="col-md-3"><div class="card-apple stat-card"><p class="text-muted mb-1">Usuários</p><h2 id="statUsers">0</h2></div></div>
            </div>
            <div class="search-glass"><i class="fas fa-search text-muted"></i><input type="text" placeholder="Procurar pedidos..." onkeyup="filtrarTabela('listaPedidos', this.value)"></div>
            <div class="card-apple">
                <h5 class="fw-bold mb-4">Pedidos de Aprovação</h5>
                <div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Docente</th><th>Espaço</th><th>Data/Hora</th><th>Ações</th></tr></thead><tbody id="listaPedidos"></tbody></table></div>
            </div>
        </section>

        <!-- Relatorio Section -->
        <section id="relatorio" class="content-section">
            <h1 class="fw-bold mb-4">Relatório de Ocupação</h1>
            <div class="search-glass"><i class="fas fa-search text-muted"></i><input type="text" placeholder="Filtrar por sala ou docente..." onkeyup="filtrarTabela('listaRelatorio', this.value)"></div>
            <div class="card-apple">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead><tr><th>Sala/Espaço</th><th>Data</th><th>Horário</th><th>Responsável</th><th>Contacto</th></tr></thead>
                        <tbody id="listaRelatorio"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://exooykvgjxckvcnxhiap.supabase.co";
        const SUPABASE_KEY = "sb_publishable_i5paySUP8L7xAGsBENbBBg_UC3Eu_Fm";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!sessionStorage.getItem('loggedFuncao')?.toLowerCase().includes('gestor')) window.location.href = 'index.html';

        function showToast(msg) {
            const t = document.createElement('div'); t.className='toast-apple'; t.textContent=msg;
            document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(), 4000);
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector('.nav-' + id.substring(0,3)).classList.add('active');
            if(window.innerWidth < 992) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            let overlay = document.querySelector(".mobile-overlay");
            if(!overlay) {
                overlay = document.createElement("div"); overlay.className = "mobile-overlay";
                document.body.appendChild(overlay); overlay.onclick = toggleSidebar;
            }
            overlay.classList.toggle("active");
        }

        function formatarData(dataStr) {
            if(!dataStr) return '-';
            const [y, m, d] = dataStr.split('-'); return `${d}/${m}/${y}`;
        }

        async function carregarDados() {
            const { data: reqs } = await supabaseClient.from('requisitions').select('*').order('created_at', {ascending: false});
            const { data: profiles } = await supabaseClient.from('profiles').select('*');

            const pendentes = reqs.filter(r => r.estado.toLowerCase() === 'pendente');
            const aprovadas = reqs.filter(r => r.estado.toLowerCase() === 'aprovada');

            document.getElementById('statPendentes').textContent = pendentes.length;
            document.getElementById('statAprovadas').textContent = aprovadas.length;
            document.getElementById('statTotal').textContent = reqs.length;
            document.getElementById('statUsers').textContent = profiles?.length || 0;

            // Dashboard Table
            const tbody = document.getElementById('listaPedidos');
            tbody.innerHTML = '';
            pendentes.forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r.id}</td><td>${r.docente_nome}</td><td>${r.tipo}</td><td>${formatarData(r.data)} ${r.inicio.slice(0,5)}</td>
                    <td>
                        <button class="btn btn-sm btn-success me-1" onclick="updateStatus('${r.id}', 'Aprovada', '${r.docente_id}')"><i class="fas fa-check"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="updateStatus('${r.id}', 'Recusada', '${r.docente_id}')"><i class="fas fa-times"></i></button>
                    </td>
                </tr>`;
            });

            // Relatorio Table
            const relBody = document.getElementById('listaRelatorio');
            relBody.innerHTML = '';
            aprovadas.forEach(r => {
                const p = profiles.find(u => u.id === r.docente_id);
                relBody.innerHTML += `<tr>
                    <td>${r.tipo}</td><td>${formatarData(r.data)}</td><td>${r.inicio.slice(0,5)}-${r.fim.slice(0,5)}</td>
                    <td>${r.docente_nome}</td><td>${p ? (p.telemovel || p.email_secundario || p.email) : '-'}</td>
                </tr>`;
            });
        }

        function filtrarTabela(id, filter) {
            const f = filter.toLowerCase();
            const rows = document.getElementById(id).getElementsByTagName('tr');
            for (let row of rows) row.style.display = row.textContent.toLowerCase().includes(f) ? '' : 'none';
        }

        window.updateStatus = async (id, status, docenteId) => {
            const { error } = await supabaseClient.from('requisitions').update({ estado: status }).eq('id', id);
            if (error) { showToast('Erro: ' + error.message); return; }
            showToast('Estado atualizado!'); carregarDados();
            try {
                const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', docenteId).single();
                if (p) {
                    await supabaseClient.functions.invoke('notifications', {
                        body: { type: 'email', to: p.email_secundario || p.email, subject: 'Atualização SGRS', message: `<p>Requisição ${id} foi ${status}.</p>`, email: p.email }
                    });
                }
            } catch (e) { console.error(e); }
        }

        supabaseClient.channel('gestor-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'requisitions' }, () => carregarDados()).subscribe();
        carregarDados();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRS — Login | ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.18);
            --glass-border: rgba(255, 255, 255, 0.35);
            --apple-blue: #0071e3;
            --sf-font: 'Segoe UI', 'SF Pro Display', sans-serif;
            --radius-md: 18px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; font-family: var(--sf-font);
            background: #f0f0f5; display: flex; align-items: center; justify-content: center;
            position: relative; overflow-x: hidden;
        }
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.55;
            pointer-events: none; z-index: 0; animation: floatOrb 18s ease-in-out infinite;
        }
        .bg-orb--1 { width: 500px; height: 500px; background: radial-gradient(circle, #a5c8ff 0%, #7aa9ff 40%, transparent 70%); top: -180px; left: -120px; }
        .bg-orb--2 { width: 420px; height: 420px; background: radial-gradient(circle, #c4b5fd 0%, #a78bfa 40%, transparent 70%); bottom: -160px; right: -100px; animation-delay: -7s; }
        .bg-orb--3 { width: 340px; height: 340px; background: radial-gradient(circle, #fecaca 0%, #fca5a5 40%, transparent 70%); top: 50%; left: 55%; animation-delay: -12s; opacity: 0.4; }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(40px, -30px) scale(1.08); }
            40% { transform: translate(-25px, 35px) scale(0.94); }
            60% { transform: translate(30px, 20px) scale(1.05); }
            80% { transform: translate(-35px, -25px) scale(0.96); }
        }
        .login-wrapper {
            position: relative; z-index: 1; width: 920px; max-width: 95vw; display: flex;
            border-radius: 32px; overflow: hidden; backdrop-filter: blur(28px);
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            box-shadow: 0 25px 70px rgba(0,0,0,0.12);
        }
        .login-left {
            flex: 0 0 44%; background: rgba(255,255,255,0.25); backdrop-filter: blur(20px);
            padding: 48px 36px; display: flex; flex-direction: column; justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.3); color: #1d1d1f;
        }
        .logo-icon {
            width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; background: rgba(255,255,255,0.55); margin: 0 auto 20px;
        }
        .login-right {
            flex: 1; padding: 48px 40px; background: rgba(255,255,255,0.35); backdrop-filter: blur(18px);
        }
        .form-group-apple { margin-bottom: 20px; }
        .input-glass {
            display: flex; align-items: center; background: rgba(255,255,255,0.55); border: 1.5px solid rgba(200,200,210,0.5);
            border-radius: 14px; padding: 6px 6px 6px 16px; gap: 8px;
        }
        .input-glass:focus-within { border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0,113,227,0.12); }
        .input-glass input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.95rem; }
        .btn-apple {
            width: 100%; padding: 14px; border-radius: 14px; font-weight: 600; border: none;
            background: #1d1d1f; color: #fff; cursor: pointer;
        }
        .toast-container-apple { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast-apple {
            background: rgba(255,255,255,0.75); border-radius: 18px; padding: 14px 20px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; }
            .login-left { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.3); }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="toast-container-apple" id="toastContainer"></div>
    <div class="login-wrapper">
        <div class="login-left">
            <div class="text-center">
                <div class="logo-icon"><i class="fas fa-university"></i></div>
                <h2>ISCTEM</h2>
                <p>Sistema de Gestão de Requisição de Salas</p>
            </div>
        </div>
        <div class="login-right">
            <h3>Bem-vindo ao SGRS</h3>
            <form id="loginForm" novalidate>
                <div class="form-group-apple">
                    <label>Email Institucional</label>
                    <div class="input-glass" id="emailGlass">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="exemplo@isctem.ac.mz" required>
                    </div>
                    <div class="field-hint" id="emailHint"></div>
                </div>
                <div class="form-group-apple">
                    <label>Palavra-passe</label>
                    <div class="input-glass" id="passGlass">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                        <button type="button" id="togglePassword" class="btn-icon"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="field-hint" id="passHint"></div>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <a href="#" id="recoverLink">Recuperar acesso?</a>
                </div>
                <button type="submit" class="btn-apple" id="submitBtn">
                    <span class="btn-text">Entrar</span>
                </button>
            </form>
            <div class="text-center mt-4">
                <a href="registo.html">Criar conta</a>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAH9cA7UTOUzzHFKswBAkAOjdZIyynaMQg",
            authDomain: "sgrs-isctem.firebaseapp.com",
            projectId: "sgrs-isctem",
            storageBucket: "sgrs-isctem.firebasestorage.app",
            messagingSenderId: "1029014740161",
            appId: "1:1029014740161:web:e80c034c58df4424928840"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const EMAIL_REGEX = /^[a-zA-Z0-9._%+-]+@isctem\.ac\.mz$/;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-apple toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.getElementById('togglePassword').addEventListener('click', function() {
            const pass = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pass.type === 'password') {
                pass.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pass.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        document.getElementById('recoverLink').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!EMAIL_REGEX.test(email)) {
                showToast('Insira um email institucional válido.', 'error');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showToast('Email de recuperação enviado! Verifique a sua caixa de entrada.', 'success');
            } catch (error) {
                showToast('Erro ao enviar email: ' + error.message, 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!EMAIL_REGEX.test(email)) {
                showToast('Formato de email inválido.', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Palavra-passe deve ter no mínimo 6 caracteres.', 'error');
                return;
            }

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Buscar dados adicionais no Firestore
                const docRef = db.collection('users').doc(user.uid);
                const doc = await docRef.get();
                let funcao = 'Docente';
                let nome = 'Utilizador';

                if (doc.exists) {
                    const data = doc.data();
                    funcao = data.funcao || funcao;
                    nome = data.nome || nome;
                } else {
                    // Cria documento básico se não existir
                    await docRef.set({
                        email: email,
                        nome: 'Utilizador',
                        funcao: 'Docente'
                    });
                }

                sessionStorage.setItem('loggedEmail', user.email);
                sessionStorage.setItem('loggedNome', nome);
                sessionStorage.setItem('loggedFuncao', funcao);
                sessionStorage.setItem('loggedUid', user.uid);

                showToast('Login bem-sucedido! Redireccionando...', 'success');

                // Redireccionamento forçado após 500ms
                setTimeout(() => {
                    const role = funcao.toLowerCase();
                    if (role.includes('admin')) {
                        window.location.replace('dashboard_admin.html');
                    } else if (role.includes('gestor')) {
                        window.location.replace('dashboard_gestor.html');
                    } else {
                        window.location.replace('dashboard_docente.html');
                    }
                }, 800);

            } catch (error) {
                showToast('Falha no login: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>

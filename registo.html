<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | SGRS ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass-bg: rgba(255,255,255,0.25); --apple-blue: #0071e3; --sf-font: 'Segoe UI', sans-serif; }
        body { margin:0; font-family: var(--sf-font); background:#f0f0f5; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .bg-orb { position:fixed; border-radius:50%; filter:blur(120px); opacity:0.4; }
        .bg-orb--1 { width:500px; height:500px; background:radial-gradient(circle, #d4b8f0, #b388ff); top:-120px; left:-100px; }
        .bg-orb--2 { width:420px; height:420px; background:radial-gradient(circle, #b3e5fc, #81d4fa); bottom:-110px; right:-80px; }
        .container { position:relative; z-index:1; background:var(--glass-bg); backdrop-filter:blur(25px); border-radius:24px; padding:40px; max-width:500px; width:90%; }
        .input-glass { display:flex; align-items:center; background:rgba(255,255,255,0.5); border-radius:14px; padding:10px 16px; gap:10px; margin-bottom:15px; }
        .input-glass input, .input-glass select { background:transparent; border:none; outline:none; flex:1; }
        .btn-glass { background:#1d1d1f; color:white; border:none; padding:12px 24px; border-radius:14px; width:100%; cursor:pointer; }
        .toast-apple { background:rgba(255,255,255,0.75); border-radius:18px; padding:14px 20px; margin-bottom:10px; position:fixed; top:20px; right:20px; z-index:9999; }
    </style>
</head>
<body>
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

<div class="container">
    <div class="text-center mb-4">
        <i class="fas fa-university fa-3x" style="color:#6a1b9a;"></i>
        <h3>Criar Conta</h3>
    </div>
    <form id="formRegisto">
        <div class="mb-3">
            <label>Email</label>
            <div class="input-glass"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="nome@isctem.ac.mz" required></div>
            <small id="emailFeedback"></small>
        </div>
        <div class="mb-3">
            <label>Nome Completo</label>
            <div class="input-glass"><i class="fas fa-user"></i><input type="text" id="regNome" placeholder="Nome" required></div>
        </div>
        <div class="mb-3">
            <label>Palavra-passe</label>
            <div class="input-glass"><i class="fas fa-lock"></i><input type="password" id="regSenha" minlength="6" required></div>
            <small id="senhaFeedback"></small>
        </div>
        <div class="mb-3">
            <label>Confirmar Palavra-passe</label>
            <div class="input-glass"><i class="fas fa-lock"></i><input type="password" id="regConfirmarSenha" required></div>
            <small id="confirmarFeedback"></small>
        </div>
        <div class="mb-3">
            <label>Função</label>
            <div class="input-glass">
                <i class="fas fa-user-tag"></i>
                <select id="regFuncao" required>
                    <option value="">Selecionar...</option>
                    <option value="Docente">Docente</option>
                    <option value="Gestor">Gestor Académico</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn-glass"><i class="fas fa-user-plus me-2"></i>Registar</button>
    </form>
    <p class="text-center mt-3"><a href="index.html">Já tem conta?</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAH9cA7UTOUzzHFKswBAkAOjdZIyynaMQg",
        authDomain: "sgrs-isctem.firebaseapp.com",
        projectId: "sgrs-isctem",
        storageBucket: "sgrs-isctem.firebasestorage.app",
        messagingSenderId: "1029014740161",
        appId: "1:1029014740161:web:e80c034c58df4424928840"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const EMAIL_REGEX = /^[a-zA-Z0-9._%+-]+@isctem\.ac\.mz$/;
    const NAME_REGEX = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-apple';
        toast.innerHTML = `<span>${message}</span>`;
        document.getElementById('toastContainer').appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('formRegisto').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('regEmail').value.trim();
        const nome = document.getElementById('regNome').value.trim();
        const senha = document.getElementById('regSenha').value;
        const confirmar = document.getElementById('regConfirmarSenha').value;
        const funcao = document.getElementById('regFuncao').value;

        if (!EMAIL_REGEX.test(email) || !NAME_REGEX.test(nome) || senha.length < 6 || senha !== confirmar || !funcao) {
            showToast('Dados inválidos. Verifique os campos.', 'error');
            return;
        }

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
            const user = userCredential.user;
            await db.collection('users').doc(user.uid).set({
                nome: nome,
                funcao: funcao,
                email: email
            });
            showToast('Conta criada com sucesso! Redirecionando...', 'success');
            setTimeout(() => window.location.href = 'index.html', 2000);
        } catch (error) {
            showToast('Erro: ' + error.message, 'error');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRS — Registo | ISCTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --apple-blue: #0071e3;
            --sf-font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-apple: 24px;
            --transition-apple: cubic-bezier(0.2, 0, 0, 1);
            --success-color: #34c759;
            --error-color: #ff3b30;
        }
        body {
            margin: 0; min-height: 100vh; font-family: var(--sf-font);
            background: #fbfbfd; display: flex; align-items: center; justify-content: center;
            position: relative; overflow-x: hidden; color: #1d1d1f; padding: 40px 20px;
        }
        .liquid-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: linear-gradient(135deg, #f5f7fa 0%, #e4e7eb 100%);
        }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5;
            animation: floatLiquid 30s infinite alternate var(--transition-apple);
        }
        .bg-orb--1 { width: 500px; height: 500px; background: radial-gradient(circle, #818cf8 0%, #c084fc 100%); top: -100px; right: -100px; }
        .bg-orb--2 { width: 400px; height: 400px; background: radial-gradient(circle, #38bdf8 0%, #818cf8 100%); bottom: -100px; left: -50px; animation-delay: -8s; }
        @keyframes floatLiquid {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .registo-card {
            width: 100%; max-width: 650px; background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: 36px; padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08); animation: cardAppear 0.6s var(--transition-apple);
        }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-isctem { width: 100px; margin-bottom: 30px; }
        h2 { font-weight: 700; font-size: 32px; letter-spacing: -0.5px; margin-bottom: 8px; }
        .subtitle { color: #86868b; margin-bottom: 35px; font-size: 17px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .input-group-glass { margin-bottom: 24px; position: relative; }
        .input-glass {
            background: rgba(255, 255, 255, 0.6); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 12px 18px; display: flex; align-items: center;
            transition: all 0.3s var(--transition-apple);
        }
        .input-glass:focus-within { background: #fff; border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1); }
        .input-glass i { color: #86868b; margin-right: 12px; width: 20px; text-align: center; }
        .input-glass input, .input-glass select {
            border: none; background: transparent; width: 100%; outline: none; font-size: 16px;
        }

        .input-glass--success { border-color: var(--success-color) !important; background: rgba(52, 199, 89, 0.05); }
        .input-glass--error { border-color: var(--error-color) !important; background: rgba(255, 59, 48, 0.05); }

        .feedback-text { font-size: 12px; margin-top: 6px; padding-left: 4px; min-height: 18px; transition: 0.2s; }
        .feedback-text.error { color: var(--error-color); }
        .feedback-text.success { color: var(--success-color); }

        .btn-registo {
            background: var(--apple-blue); color: #fff; border: none; width: 100%;
            padding: 16px; border-radius: 18px; font-weight: 600; font-size: 17px;
            transition: 0.2s; cursor: pointer; margin-top: 10px;
        }
        .btn-registo:hover { background: #0077ed; transform: scale(1.01); }
        .btn-registo:active { transform: scale(0.99); }

        .admin-key-field { display: none; margin-top: 10px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .toast-apple {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            background: rgba(29, 29, 31, 0.9); color: #fff; padding: 16px 24px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideInToast 0.4s var(--transition-apple);
        }
        @keyframes slideInToast { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="liquid-container">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
    </div>

    <div class="registo-card">
        <img src="https://isctem.ac.mz/wp-content/uploads/2023/05/isctem-logo.png" alt="ISCTEM" class="logo-isctem">
        <h2>Criar nova conta</h2>
        <p class="subtitle">Registe-se no Sistema de Gestão de Requisição de Salas.</p>

        <form id="registoForm">
            <div class="form-grid">
                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Email Institucional</label>
                    <div class="input-glass" id="emailGlass">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="nome@isctem.ac.mz" required>
                    </div>
                    <div class="feedback-text" id="emailFeedback">Use o domínio @isctem.ac.mz</div>
                </div>

                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Telemóvel (Moçambique)</label>
                    <div class="input-glass" id="telGlass">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="telemovel" placeholder="841234567" maxlength="9" required>
                    </div>
                    <div class="feedback-text" id="telFeedback">Ex: 841234567</div>
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Nome Completo</label>
                    <div class="input-glass" id="nomeGlass">
                        <i class="fas fa-user"></i>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="feedback-text" id="nomeFeedback">Como aparecerá nos relatórios</div>
                </div>

                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Email Secundário</label>
                    <div class="input-glass" id="emailSecGlass">
                        <i class="fas fa-envelope-circle-check"></i>
                        <input type="email" id="emailSecundario" placeholder="gmail, outlook, etc" required>
                    </div>
                    <div class="feedback-text" id="emailSecFeedback">Para recuperação de conta</div>
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Palavra-passe</label>
                    <div class="input-glass" id="senhaGlass">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="feedback-text" id="senhaFeedback"></div>
                </div>

                <div class="input-group-glass">
                    <label class="form-label small ms-1 text-muted">Confirmar Password</label>
                    <div class="input-glass" id="confirmarGlass">
                        <i class="fas fa-shield-halved"></i>
                        <input type="password" id="confirmarSenha" placeholder="Repita a password" required>
                    </div>
                    <div class="feedback-text" id="confirmarFeedback"></div>
                </div>
            </div>

            <div class="input-group-glass">
                <label class="form-label small ms-1 text-muted">Função / Cargo</label>
                <div class="input-glass">
                    <i class="fas fa-briefcase"></i>
                    <select id="funcao" required>
                        <option value="" disabled selected>Selecione a sua função</option>
                        <option value="Docente">Docente</option>
                        <option value="Gestor">Gestor Académico</option>
                        <option value="Admin">Administrador do Sistema</option>
                    </select>
                </div>
            </div>

            <div class="input-group-glass admin-key-field" id="adminKeyWrapper">
                <label class="form-label small ms-1 text-muted">Chave de Administrador</label>
                <div class="input-glass" id="adminKeyGlass">
                    <i class="fas fa-key"></i>
                    <input type="password" id="adminKey" placeholder="Introduza a chave mestre">
                </div>
                <div class="feedback-text" id="adminKeyFeedback">Requerido para privilégios de Admin</div>
            </div>

            <button type="submit" class="btn-registo mt-2" id="submitBtn">Criar Conta</button>
            
            <div class="text-center mt-4">
                <p class="small text-muted">Já tem uma conta? <a href="index.html" class="text-decoration-none fw-bold" style="color: var(--apple-blue)">Fazer Login</a></p>
            </div>
        </form>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://exooykvgjxckvcnxhiap.supabase.co";
        const SUPABASE_KEY = "sb_publishable_i5paySUP8L7xAGsBENbBBg_UC3Eu_Fm";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const EMAIL_REGEX = /^[a-zA-Z0-9._%+-]+@isctem\.ac\.mz$/;
        const TEL_REGEX = /^(82|83|84|85|86|87)\d{7}$/;
        const NAME_REGEX = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast-apple toast-${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function setFieldState(element, feedback, state, message) {
            element.classList.remove('input-glass--success', 'input-glass--error');
            feedback.classList.remove('success', 'error');
            feedback.textContent = message;
            if (state === 'success') { element.classList.add('input-glass--success'); feedback.classList.add('success'); }
            if (state === 'error') { element.classList.add('input-glass--error'); feedback.classList.add('error'); }
        }

        const funcaoSelect = document.getElementById('funcao');
        const adminKeyWrapper = document.getElementById('adminKeyWrapper');

        funcaoSelect.addEventListener('change', function() {
            if (this.value === 'Admin') {
                adminKeyWrapper.style.display = 'block';
            } else {
                adminKeyWrapper.style.display = 'none';
            }
        });

        // Real-time validations similar to previous logic but adapted
        document.getElementById('registoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('senha').value;
            const nome = document.getElementById('nome').value.trim();
            const telemovel = document.getElementById('telemovel').value.trim();
            const emailSec = document.getElementById('emailSecundario').value.trim();
            const funcao = document.getElementById('funcao').value;
            const adminKey = document.getElementById('adminKey').value.trim();

            if (funcao === 'Admin') {
                const { data: isValidKey } = await supabaseClient.rpc('check_admin_key', { key_input: adminKey });
                if (!isValidKey) {
                    showToast('Chave de administrador incorreta.', 'error');
                    return;
                }
            }

            try {
                // 1. Sign up user
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email,
                    password
                });

                if (authError) throw authError;

                // 2. Create profile
                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert({
                        id: authData.user.id,
                        email,
                        nome,
                        funcao,
                        email_secundario: emailSec,
                        telemovel
                    });

                if (profileError) {
                    // Cleanup auth if profile creation fails
                    // Note: Supabase doesn't easily allow deleting users from client side for security
                    throw profileError;
                }

                showToast('Conta criada com sucesso! Verifique o seu email.', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);

            } catch (error) {
                showToast('Erro ao criar conta: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
